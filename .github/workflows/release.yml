name: Release VSIX And Marketplace

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Package And Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify and package
        run: xvfb-run -a pnpm verify:release

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION="$(node -p "require('./extension/package.json').version")"
          EXPECTED_TAG="v${VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} must match extension/package.json version ${EXPECTED_TAG}." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "vsix=extension/guruguru-codechan-${VERSION}.vsix" >> "${GITHUB_OUTPUT}"

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          VSIX release for guruguru-codechan.

          Install this package from VS Code with:

          ```sh
          code --install-extension guruguru-codechan-${{ steps.meta.outputs.version }}.vsix --force
          ```

          This release includes the bundled non-commercial sample asset set. User-imported assets remain owned by the user or their licensors.
          EOF

      - name: Check Marketplace publishing token
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "Repository secret VSCE_PAT is required to publish to the Visual Studio Marketplace." >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${{ steps.meta.outputs.vsix }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "guruguru-codechan ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --verify-tag

      - name: Publish to Visual Studio Marketplace
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --packagePath "guruguru-codechan-${{ steps.meta.outputs.version }}.vsix"
